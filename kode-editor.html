<!DOCTYPE html>
<html lang="id">
<head>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
  }
  .kartu {
    background: white;
    padding: 2.5rem;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    text-align: center;
    max-width: 400px;
    transition: transform 0.3s ease;
  }
  .kartu:hover {
    transform: translateY(-5px);
  }
  h1 { 
    color: #333; 
    margin-top: 0;
  }
  p { 
    color: #666; 
    line-height: 1.6;
  }
  button {
    background: #ff6b6b;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.2s;
  }
  button:hover { 
    background: #fa5252; 
  }
</style>
</head>
<body>

  <div class="kartu">
    <h1>Halo, Dunia! 👋</h1>
    <p>Ini adalah tampilan pratinjau langsung. Coba ubah teks atau warna di editor sebelah kiri, dan lihat perubahannya secara otomatis di sini.</p>
    <button id="tombolSapa">Sapa Saya!</button>
  </div>

  <script>
    document.getElementById('tombolSapa').addEventListener('click', function() {
      // Menggunakan custom pesan di HTML daripada alert browser biasa
      const tombol = this;
      const teksAwal = tombol.innerText;
      tombol.innerText = 'Senang bertemu denganmu!';
      tombol.style.background = '#4cd137';
      
      setTimeout(() => {
        tombol.innerText = teksAwal;
        tombol.style.background = '#ff6b6b';
      }, 2000);
    });
  </script>

</body>
</html>
